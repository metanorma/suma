# directives are YAML-specific instructions
directives:
  # - documents-inline
  # to inject the XML into the collection manifest; 
  - documents-external 
  # keeps them outside
bibdata:
  type: collection
  title:
    - type: title-main
      language: en
      content: ISO Collection 1
  docidentifier:
    - content: ISO 12345
      type: iso
      primary: true
  date:
    - type: created
      at: "2020"
    - type: issued
      at: "2020"
  edition:
    content: "1"
  copyright:
    - from: "2020"
      owner:
        - organization:
            name:
              - content: International Organization for Standardization
            abbreviation:
              content: ISO
manifest:
  level: collection
  title: ISO Collection 
  # uncommenting crashes in "lib/suma/collection_manifest.rb:58:in `process_entry'"
